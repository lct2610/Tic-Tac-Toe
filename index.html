<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIC TAC TOE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Top Banner -->
    <header class="top-banner">
        <div class="banner-content">
            Tic Tac Toe • Tic Tac Toe • Tic Tac Toe • Tic Tac Toe
        </div>
    </header>
    
    <!-- Game Section -->
    <main class="game-wrapper">

        <!-- Game Board -->
        <section class="board">
            <div class="line"></div>

            <div class="box"><span class="boxtext"></span></div>
            <div class="box"><span class="boxtext"></span></div>
            <div class="box"><span class="boxtext"></span></div>
            <div class="box"><span class="boxtext"></span></div>
            <div class="box"><span class="boxtext"></span></div>
            <div class="box"><span class="boxtext"></span></div>
            <div class="box"><span class="boxtext"></span></div>
            <div class="box"><span class="boxtext"></span></div>
            <div class="box"><span class="boxtext"></span></div>
        </section>

        <!-- Game Info -->
        <section class="gameInfo">
            <div class="square-bg">
                <h1>MAKE YOUR MOVE</h1>

                <p class="info">Turn for X</p>

                <div class="buttons">
                    <button id="reset">RESET</button>
                    <button id="resetScore">RESET SCORE</button>
                </div>

                <div class="score-board">
                    <p>SCORE BOARD</p>
                    <p>X : <span id="scoreX">0</span></p>
                    <p>O : <span id="scoreO">0</span></p>
                </div>
            </div>
        </section>
    </main>

    <!--Bottom Banner-->
    <footer class="bottom-banner">
        <div class="banner-content">
            Play & Enjoy • Play & Enjoy • Play & Enjoy • Play & Enjoy
        </div>
    </footer>

    <script src="script.js"></script> 
</body>
</html>
